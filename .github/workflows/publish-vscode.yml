name: Package VS Code extension

on:
  push:
    tags:
      - "vscode-v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (package only, no marketplace publish)"
        type: boolean
        default: true

jobs:
  publish:
    name: Package devory-vscode for manual upload
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build dependencies
        run: |
          npm run build --workspace packages/core
          npm run build --workspace packages/github
          npm run build --workspace packages/cli

      - name: Run extension tests
        run: npm run test --workspace packages/vscode

      - name: Package extension
        run: npm run package --workspace packages/vscode

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: devory-vscode-${{ github.ref_name }}
          path: packages/vscode/*.vsix
          retention-days: 30
